<div class="flex flex-col flex-auto min-w-0">

    <!-- Header -->


    <!-- Main -->
    <div *ngIf="Loader" class="wrapper-loader mx-auto mt-6">
        <img class="wrapper-loader mx-auto" style="width: 100px; margin-left: auto; margin-right: auto;"
            src="assets/images/icons/page_loader_default5.gif" alt="" class="w30 rounded-full" />
    </div>
    <div *ngIf="!Loader" class="flex-auto ">
        <div class="w-full p-6 mx-auto">
            <form [formGroup]="notificationForm">
                <div class=" bg-card shadow rounded-2xl">
                    <div class=" flex justify-between  bg-gray-800 p-2 px-6" style="align-items: center;">
                        <span class="text-white font-medium" style="font-size: 17px;">Notification Form</span>
                        <button class="rounded bg-white" mat-stroked-button (click)="back()">Back</button>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 gap-6 p-6 pb-0 gap-y-0 w-full min-w-0">
                        <div class="flex flex-col flex-auto overflow-hidden">
                            <mat-form-field class="w-full">
                                <mat-label>Users<span class="red">*</span></mat-label>
                                <mat-select multiple formControlName="userId" (selectionChange)="changeUsers($event.value)" >
                                    <!-- Search Box -->
                                    <mat-option>
                                        <ngx-mat-select-search
                                            noEntriesFoundLabel="User not found, please enter a valid User name"
                                            [formControl]="search_user" placeholderLabel="Search User name ..."
                                            >
                                        </ngx-mat-select-search>
                                    </mat-option>

                                    <!-- Select All Option -->
                                    <mat-option (click)="toggleSelectAll()"  [value]="'all'" [checked]="isAllSelected">
                                        <!-- <mat-checkbox *ngIf="isAllSelected" [checked]="isAllSelected"
                                            (change)="toggleSelectAll()"></mat-checkbox> -->
                                        <b >Select All</b>
                                    </mat-option>

                                    <!-- User List -->
                                    <mat-option *ngFor="let item of filteredUsers" [value]="item"
                                        [selected]="isUserSelected(item)">
                                        {{ item.f_name }} {{ item.l_name }}
                                    </mat-option>
                                </mat-select>
                                <mat-error
                                    *ngIf="notificationForm.get('userId').hasError('required')">
                                    Please select at least one user
                                </mat-error> 
                            </mat-form-field>

                            <!-- Display Selected Users -->
                            <div *ngIf="selectedUsers?.length > 0" class="rounded-lg bg-gray-200 p-6 mb-3">
                                <mat-label class="font-bold">Selected Users:</mat-label>
                                <div class="flex flex-col flex-auto overflow-hidden"
                                    *ngFor="let item of selectedUsers; let i = index">
                                    <mat-label class="flex items-center justify-between">
                                        {{ i + 1 }} : {{ item.f_name }} {{ item.l_name }}
                                        <mat-icon class="icon-size-5 text-red-500 ml-5" svgIcon="mat_outline:close"
                                            (click)="removeUsers(i, item.id)" matTooltip="Remove User"
                                            matTooltipPosition="above"></mat-icon>
                                    </mat-label>
                                </div>
                            </div>

                        </div>

                        <div class="flex flex-col flex-auto overflow-hidden">
                            <mat-form-field class="w-full">
                                <mat-label>Title<span class="red">*</span></mat-label>
                                <input matInput formControlName="name">
                                <mat-error *ngIf="notificationForm.get('name').hasError('required')">Please Enter
                                    Notification Title</mat-error>
                            </mat-form-field>
                        </div>

                        <!-- <div class="flex flex-col flex-auto overflow-hidden">
                            <mat-form-field class="w-full">
                                <mat-label>Status<span class="red">*</span></mat-label>
                                <mat-select formControlName="status">
                                    <mat-option *ngFor="let status of status"
                                        [value]="status">{{status.name}}</mat-option>
                                </mat-select>
                            </mat-form-field>
                        </div> -->

                    </div>
                    <div class="grid grid-cols-1  gap-6 px-6 gap-y-0 w-full min-w-0">
                        <div class="flex flex-col flex-auto overflow-hidden">
                            <mat-label class="mb-1 normallabel">Message<span class="red">*</span></mat-label>
                            <angular-editor formControlName="message" [config]="config"></angular-editor>
                        </div>
                    </div>

                    <div
                        class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 gap-6 p-6 pt-0 gap-y-0 w-full min-w-0 mt-6">

                        <div class="flex  items-center flex-auto overflow-hidden justify-end ">
                            <button *ngIf="!updateButton" class="fuse-mat-button-rounded " mat-flat-button
                                (click)="insertNotificationDetails()">
                                <span *ngIf="!addLoader">Submit</span>
                                <div *ngIf="addLoader" class="wrapper-loader">
                                    <img class="img-fluid" style="width: 30px; margin-left: auto; margin-right: auto;"
                                        src="assets/images/icons/page_loader_default5.gif" alt=""
                                        class="w30 rounded-full" />
                                </div>
                            </button>
                            <button *ngIf="updateButton" class="fuse-mat-button-rounded " mat-flat-button
                                (click)="updateNotificationDetails()">
                                <span *ngIf="!updateLoader">Update</span>
                                <div *ngIf="updateLoader" class="wrapper-loader">
                                    <img class="img-fluid" style="width: 30px; margin-left: auto; margin-right: auto;"
                                        src="assets/images/icons/page_loader_default5.gif" alt=""
                                        class="w30 rounded-full" />
                                </div>
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<div class="popcenter">
    <ng-template #callAPIDialog>
        <div class="flex flex-auto justify-between overflow-hidden relative"
            *ngIf="showAllDocImg == 1 && ImagedocumentType=='alldocOpenImage'">
            <h2 matDialogTitle class="font-medium text-xl">viewImage</h2>
        </div>
        <div class="p-6 overflow-hidden max-w-full" style="width: 50vw;">
            <mat-icon svgIcon="mat_outline:close"
                style="color: red; cursor: pointer; position: absolute; z-index: 111; top: 25%; left: 74%;"
                matDialogClose="yes" (click)="close()"></mat-icon>
            <div class="max-w-10xl">
                <img style="height: 270px;" class="position-relative maxwh cursorpointer" title="" src="{{image}} "
                    accept="image" />
            </div>
        </div>
    </ng-template>
</div>
