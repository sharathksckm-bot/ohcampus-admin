<div class="flex flex-col flex-auto min-w-0">

    <!-- Header -->
   

    <!-- Main -->
    <div *ngIf="Loader" class="wrapper-loader mx-auto mt-6">
        <img class="wrapper-loader mx-auto"
            style="width: 100px; margin-left: auto; margin-right: auto;"
            src="assets/images/icons/page_loader_default5.gif" alt="" class="w30 rounded-full" />
    </div>
    <div *ngIf="!Loader" class="flex-auto ">
        <div class="w-full p-6 mx-auto">
            <form [formGroup]="cityForm" >
                <div class=" bg-card shadow rounded-2xl">
                        <div class=" flex justify-between  bg-gray-800 p-2 px-6" style="align-items: center;">
                            <span class="text-white font-medium" style="font-size: 17px;">City Form</span>
                            <button  class="rounded  bg-white" mat-stroked-button (click)="back()">Back</button>
                        </div>
                       <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 gap-6 p-6 pb-0 gap-y-0 w-full min-w-0">
                        <div class="flex flex-col flex-auto overflow-hidden">
                            <mat-form-field class="w-full">
                                <mat-label>Country<span class="red">*</span></mat-label>
                                <mat-select formControlName="country" (ngModelChange)="getStateDetailsByCntId()">
                                    <mat-option *ngFor="let item of countryListData" [value]="item.id">
                                        {{item.country}}
                                      </mat-option>
                                </mat-select>
                                <mat-error *ngIf="cityForm.get('country').hasError('required')">Please select
                                    country</mat-error>
                            </mat-form-field>
                        </div>
                        <div class="flex flex-col flex-auto overflow-hidden">
                            <mat-form-field class="w-full">
                                <mat-label>State<span class="red">*</span></mat-label>
                                <mat-select formControlName="state">
                                    <mat-option *ngFor="let item of stateListData" [value]="item.id">
                                        {{item.statename}}
                                      </mat-option>
                                </mat-select>
                                <div *ngIf="stateLoader" class="wrapper-loader">
                                    <img class="img-fluid"
                                        style="width: 30px; margin-left: auto; margin-right: auto;"
                                        src="assets/images/icons/page_loader_default5.gif" alt="" class="w30 rounded-full" />
                                </div>
                                <mat-error *ngIf="cityForm.get('state').hasError('required')">Please select
                                    state</mat-error>
                            </mat-form-field>
                        </div>
                        <div class="flex flex-col flex-auto overflow-hidden">
                            <mat-form-field class="w-full">
                                <mat-label>City<span class="red">*</span></mat-label>
                                <input matInput formControlName="city"  min="3">
                                <mat-error *ngIf="cityForm.get('city').hasError('required')">Please enter
                                    city name</mat-error>
                                <mat-error *ngIf="cityForm.get('city').hasError('pattern')">Enter valid
                                     name</mat-error>
                                <mat-error *ngIf="cityForm.get('city').hasError('minlength')">Enter minimum 3 character
                                    name</mat-error>
                            </mat-form-field>
                        </div>
                        <div class="flex flex-col flex-auto overflow-hidden mt-8">
                            <mat-checkbox formControlName="menu" (change)="updateTopMenuValue($event)">
                              <mat-label>Need to display in menu?</mat-label>
                            </mat-checkbox>
                            <mat-error *ngIf="cityForm.get('menu').hasError('required')">Please Enter Top Menu</mat-error>
                        </div>
                    </div>
                        <div class="flex  items-center flex-auto  justify-end pb-3 mr-3 flex-wrap">
                            <div class="flex flex-row items-center flex-auto overflow-hidden ml-6 mb-6">
                                <div>
                                    <input id="image-file-input1"
                                        class="absolute h-0 w-0 opacity-0 invisible pointer-events-none bg-white"
                                        (change)="onFileChange($event,'cityDocument',$event.target.files)"
                                        type="file" [multiple]="false"
                                        [accept]="'image/jpeg, image/png'" #imageFileInput1 />
                                        <label
                                        class="flex items-center justify-center w-28 h-10 text-black rounded cursor-pointer uplodBtn"
                                        for="image-file-input1" matRipple>
                                        <mat-icon svgIcon="mat_outline:add_photo_alternate"
                                            class="text-black w-4 h-4 min-w-0"></mat-icon>
                                        <span class="ml-1 mr-1 black">Upload<span class="red">*</span></span>
                                    </label>
                                </div>
                                <div *ngIf="showLoader" class="wrapper-loader ml-6">
                                    <img class="img-fluid"
                                        style="width: 30px; margin-left: auto; margin-right: auto;"
                                        src="assets/images/icons/page_loader_default5.gif" alt="" class="w30 rounded-full" />
                                </div>
                                <div *ngIf="!showLoader" class="ml-4">
                                    <div class="border rounded bg-gray-50"
                                        *ngIf="cityForm.value.cityDocument_FrontFilePath !=''">
                                        <img class="position-relative shadow-sm maxwh cursorpointer cover"
                                            style="object-fit: contain; height: 50px; width: 50px;"
                                            (click)="openImgDialog(cityForm.value.cityDocument_FrontFilePath)"
                                            src="{{cityForm.value.cityDocument_FrontFilePath}}"
                                            accept="image" />
                                    </div>
                                </div>
                            </div>
                            <button *ngIf="!updateButton" class="fuse-mat-button-rounded mr-3" mat-flat-button (click)="insertCityDetails()">
                                <span  *ngIf="!addLoader">Submit</span>
                                <div *ngIf="addLoader" class="wrapper-loader">
                                    <img class="img-fluid"
                                    style="width: 30px; margin-left: auto; margin-right: auto;"
                                        src="assets/images/icons/page_loader_default5.gif" alt="" class="w30 rounded-full" />
                                </div>
                            </button>
                            <button *ngIf="updateButton" class="fuse-mat-button-rounded mr-3" mat-flat-button (click)="updateCityDetails()">
                                <span  *ngIf="!updateLoader">Update</span>
                                <div *ngIf="updateLoader" class="wrapper-loader">
                                    <img class="img-fluid"
                                        style="width: 30px; margin-left: auto; margin-right: auto;"
                                        src="assets/images/icons/page_loader_default5.gif" alt="" class="w30 rounded-full" />
                                </div>
                            </button>
                        </div>
                 
                    
                    </div>   
                </form>
         </div>
    </div>
</div>

<div class="popcenter">
    <ng-template #callAPIDialog>
        <div class="flex flex-auto justify-between overflow-hidden relative"
            *ngIf="showAllDocImg == 1 && ImagedocumentType=='alldocOpenImage'">
            <h2 matDialogTitle class="font-medium text-xl">viewImage</h2>
        </div>
        <div class="p-6 overflow-hidden max-w-full" style="width: 50vw;">
            <mat-icon svgIcon="mat_outline:close"
                style="color: red; cursor: pointer; position: absolute; z-index: 111; top: 25%; left: 74%;"
                matDialogClose="yes" (click)="close()"></mat-icon>
            <div class="max-w-10xl">
                <img style="height: 270px;"
                    class="position-relative maxwh cursorpointer" title=""
                    src="{{image}} " accept="image" />
            </div>
        </div>
    </ng-template>
</div>
